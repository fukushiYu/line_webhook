flex_grade:
  type: bubble
  hero:
    type: image
    url: https://arc.blossom-academy.uk/static/k-grade.jpg
    size: full
    aspectRatio: '3:4'
    aspectMode: cover
  body:
    type: box
    layout: vertical
    backgroundColor: '#1a2a4a'
    paddingAll: 20px
    contents:
    - type: text
      text: Blossom Academy
      color: '#a1b5cc'
      size: sm
      weight: bold
      align: center
    - type: button
      action:
        type: uri
        label: 評分結果...
        uri: $LIFF_URL$
      style: primary
      color: '#2c4a7c'
      margin: xl
      height: sm

flex_wait:
  type: bubble
  hero:
    type: image
    url: https://arc.blossom-academy.uk/static/k-wait.jpg
    size: full
    aspectRatio: '3:4'
    aspectMode: cover
  body:
    type: box
    layout: vertical
    backgroundColor: '#1a2a4a'
    paddingAll: 20px
    contents:
    - type: text
      text: Blossom Academy
      color: '#a1b5cc'
      size: sm
      weight: bold
      align: center
    - type: button
      style: primary
      color: '#2c4a7c'
      margin: xl
      height: sm
      action:
        type: postback
        label: 等一下
        data: wait

flex_welcome:
  type: bubble
  hero:
    type: image
    url: https://arc.blossom-academy.uk/static/c-welcome.jpg
    size: full
    aspectRatio: '3:4'
    aspectMode: cover
  body:
    type: box
    layout: vertical
    backgroundColor: '#1a2a4a'
    paddingAll: 20px
    contents:
    - type: text
      text: Blossom Academy
      color: '#a1b5cc'
      size: sm
      weight: bold
      align: center
    - type: button
      style: primary
      color: '#2c4a7c'
      margin: xl
      height: sm
      action:
        type: postback
        label: 輸入驗證碼
        data: hello


flex_upload:
  type: bubble
  hero:
    type: image
    url: https://arc.blossom-academy.uk/static/c-upload.jpg
    size: full
    aspectRatio: '3:4'
    aspectMode: cover
  body:
    type: box
    layout: vertical
    backgroundColor: '#1a2a4a'
    paddingAll: 20px
    contents:
    - type: text
      text: Blossom Academy
      color: '#a1b5cc'
      size: sm
      weight: bold
      align: center
    - type: button
      action:
        type: postback
        label: 請上傳圖片
        data: action=upload_file
      style: primary
      color: '#2c4a7c'
      margin: xl
      height: sm

elementary_prompt: '!include prompt/elementary_prompt.txt'

MD_TO_HTML_PROMPT: '!include prompt/MD_TO_HTML_PROMPT.txt'
