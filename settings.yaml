    channel_access_token: '請在 settings.local.yaml 中設定'
    admin: '請在 settings.local.yaml 中設定'
    admin_prefix: "@小英"
    liff_uri: 'https://liff.line.me/1655962952-sRG07EcN'  
    endpoint_url: 'https://tpe-info.blossom-academy.uk/webhook/scorepage'
    rich_menu_id: '請在 settings.local.yaml 中設定'
  - channel_secret: '請在 settings.local.yaml 中設定'
    channel_access_token: '請在 settings.local.yaml 中設定'
    admin: '請在 settings.local.yaml 中設定'
    admin_prefix: "@ako"
    liff_uri: 'https://liff.line.me/1655962952-sRG07EcN'
    endpoint_url: 'https://tpe-info.blossom-academy.uk/webhook/scorepage'
