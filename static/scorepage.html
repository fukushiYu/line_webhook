<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>成績與數據評分頁面</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">

                    <h2 class="text-success mb-4">🏆 評分與成績查詢</h2>
                    <p class="text-muted">這是您的即時資料分析頁面</p>
                    <hr>
                    <div class="my-4">
                        <span class="fs-1 fw-bold text-primary">95</span> <span class="text-secondary">分</span>
                    </div>
                    <button class="btn btn-outline-success w-100" onclick="window.close();">關閉視窗</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
